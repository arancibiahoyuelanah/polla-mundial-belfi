    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 32px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
    }

    header p {
      margin: 8px 0 0;
      color: #d1d5db;
    }

    main {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .card span {
      color: #6b7280;
      font-size: 14px;
    }

    .card strong {
      display: block;
      margin-top: 8px;
      font-size: 28px;
    }

    .filters {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #e5e7eb;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
    }

    button.active {
      background: #111827;
      color: white;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 13px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    tr:nth-child(even) {
      background: #f9fafb;
    }

    .score {
      font-weight: bold;
      font-size: 18px;
      text-align: center;
    }

    .jugado {
      color: #047857;
      font-weight: bold;
    }

    .pendiente {
      color: #b45309;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #6b7280;
      font-size: 13px;

    function estaJugado(partido) {
      return partido.gl !== null && partido.gv !== null;
    }

    function render() {
      const tbody = document.getElementById("tablaResultados");
      tbody.innerHTML = "";

      const partidosFiltrados = partidos.filter(p => {
        if (filtroActual === "jugados") return estaJugado(p);
        if (filtroActual === "pendientes") return !estaJugado(p);
        return true;
      });

      partidosFiltrados.forEach(p => {
        const jugado = estaJugado(p);
        const resultado = jugado ? `${p.gl} - ${p.gv}` : "-";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.n}</td>
          <td>${p.grupo}</td>
          <td>${p.fecha}</td>
          <td>${p.hora}</td>
          <td>${p.local}</td>
          <td class="score">${resultado}</td>
          <td>${p.visita}</td>
          <td class="${jugado ? "jugado" : "pendiente"}">
            ${jugado ? "Jugado" : "Pendiente"}
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("totalPartidos").textContent = partidos.length;
      document.getElementById("partidosJugados").textContent = jugados;
      document.getElementById("partidosPendientes").textContent = partidos.length - jugados;
    }

      filtroActual = tipo;

      document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      boton.classList.add("active");

      render();
    }
